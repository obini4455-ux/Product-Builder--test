<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 향수 추천 테스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Apple SD Gothic Neo",sans-serif;background:#0f0f1a;color:#f0f0f5;min-height:100vh;display:flex;justify-content:center;align-items:center}
#app{width:100%;max-width:520px;padding:20px;position:relative}
.screen{display:none;animation:fadeIn .4s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.home-content{text-align:center;padding:60px 20px}
.logo-icon{font-size:80px;display:block;margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.home-title{font-size:28px;font-weight:900;background:linear-gradient(135deg,#a29bfe,#00b894);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.home-subtitle{color:#8888aa;font-size:15px;line-height:1.6;margin-bottom:40px}
.btn-primary{background:linear-gradient(135deg,#6c5ce7,#4834d4);color:#fff;border:none;padding:16px 48px;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;font-family:inherit}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,92,231,.4)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:transparent;color:#8888aa;border:2px solid #2a2a4a;padding:14px 40px;border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-secondary:hover{border-color:#6c5ce7;color:#f0f0f5}
.quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-top:10px}
.progress-bar-container{flex:1;height:6px;background:#2a2a4a;border-radius:3px;overflow:hidden}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,#6c5ce7,#00b894);border-radius:3px;transition:width .4s ease}
.progress-text{color:#8888aa;font-size:13px;font-weight:500;white-space:nowrap}
.question-card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:32px 24px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.question-number{color:#a29bfe;font-size:14px;font-weight:700;margin-bottom:12px}
.question-text{font-size:20px;font-weight:700;line-height:1.5;margin-bottom:28px;word-break:keep-all}
.options{display:flex;flex-direction:column;gap:8px}
.option-btn{background:transparent;color:#f0f0f5;border:1px solid #2a2a4a;padding:14px 20px;border-radius:12px;font-size:15px;cursor:pointer;transition:all .2s;text-align:center;font-family:inherit;font-weight:500}
.option-btn:hover{background:#2d2d5e;border-color:#6c5ce7}
.option-btn.selected{background:#6c5ce7;border-color:#6c5ce7;color:#fff}
.result-content{text-align:center;padding:20px 0}
.result-type-badge{display:inline-flex;align-items:center;justify-content:center;width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#6c5ce7,#4834d4);font-size:42px;font-weight:900;color:#fff;margin-bottom:20px;box-shadow:0 8px 32px rgba(108,92,231,.3)}
.result-title{font-size:26px;font-weight:900;margin-bottom:8px}
.result-subtitle{color:#a29bfe;font-size:16px;font-weight:500;margin-bottom:20px}
.result-description{color:#8888aa;font-size:15px;line-height:1.7;text-align:left;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:24px;margin-bottom:28px;word-break:keep-all}
.result-card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:20px 24px;margin-bottom:12px;text-align:left;font-size:14px;line-height:1.7;color:#8888aa;word-break:keep-all}
.result-card strong{color:#a29bfe;font-size:15px;margin-bottom:6px;display:inline-block}
.result-aroma{border-left:3px solid #00b894}
.result-perfume{border-left:3px solid #6c5ce7}
.result-details{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:20px 24px;margin-bottom:28px}
.detail-row{margin-bottom:16px}
.detail-row:last-child{margin-bottom:0}
.detail-item{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.detail-label{font-size:14px;font-weight:700;color:#8888aa;width:20px;text-align:center}
.detail-bar-bg{flex:1;height:8px;background:#2a2a4a;border-radius:4px;overflow:hidden}
.detail-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#6c5ce7,#a29bfe);transition:width .8s ease}
.detail-percent{font-size:12px;color:#8888aa}
.result-actions{display:flex;flex-direction:column;gap:12px;align-items:center}
@media(max-width:480px){#app{padding:12px}.home-title{font-size:22px}.question-card{padding:24px 16px}.question-text{font-size:17px}.option-btn{padding:12px 16px;font-size:14px}.result-type-badge{width:100px;height:100px;font-size:36px}}
</style>
</head>
<body>
<div id="app">
<div id="home-screen" class="screen active">
<div class="home-content">
<span class="logo-icon">🧠</span>
<h1 class="home-title">MBTI 향수 추천 테스트</h1>
<p class="home-subtitle">MBTI를 알면 향수 선택이 쉬워집니다<br>총 20문항, 약 5분 소요</p>
<button id="start-btn" class="btn-primary">테스트 시작하기</button>
</div></div>
<div id="quiz-screen" class="screen">
<div class="quiz-header">
<div class="progress-bar-container"><div class="progress-bar" id="progress-bar"></div></div>
<span class="progress-text" id="progress-text">1 / 20</span>
</div>
<div class="question-card" id="question-card">
<div class="question-number" id="question-number">Q1.</div>
<h2 class="question-text" id="question-text"></h2>
<div class="options" id="options">
<button class="option-btn" data-value="3">매우 그렇다</button>
<button class="option-btn" data-value="2">그렇다</button>
<button class="option-btn" data-value="1">약간 그렇다</button>
<button class="option-btn" data-value="0">보통이다</button>
<button class="option-btn" data-value="-1">약간 아니다</button>
<button class="option-btn" data-value="-2">아니다</button>
<button class="option-btn" data-value="-3">전혀 아니다</button>
</div></div></div>
<div id="result-screen" class="screen">
<div class="result-content">
<div class="result-type-badge" id="result-badge"></div>
<h1 class="result-title" id="result-title"></h1>
<div class="result-subtitle" id="result-subtitle"></div>
<div class="result-description" id="result-description"></div>
<div class="result-card result-aroma" id="result-aroma"><strong>🌿 아로마오일 추천</strong><br><span></span></div>
<div class="result-card result-perfume" id="result-perfume"><strong>🧴 시중 향수 추천</strong><br><span></span></div>
<div class="result-details">
<div class="detail-row"><div class="detail-item"><span class="detail-label">E</span><div class="detail-bar-bg"><div class="detail-bar" id="bar-e" style="width:50%"></div></div><span class="detail-label">I</span></div><div class="detail-percent" id="percent-ei">50% / 50%</div></div>
<div class="detail-row"><div class="detail-item"><span class="detail-label">S</span><div class="detail-bar-bg"><div class="detail-bar" id="bar-s" style="width:50%"></div></div><span class="detail-label">N</span></div><div class="detail-percent" id="percent-sn">50% / 50%</div></div>
<div class="detail-row"><div class="detail-item"><span class="detail-label">T</span><div class="detail-bar-bg"><div class="detail-bar" id="bar-t" style="width:50%"></div></div><span class="detail-label">F</span></div><div class="detail-percent" id="percent-tf">50% / 50%</div></div>
<div class="detail-row"><div class="detail-item"><span class="detail-label">J</span><div class="detail-bar-bg"><div class="detail-bar" id="bar-j" style="width:50%"></div></div><span class="detail-label">P</span></div><div class="detail-percent" id="percent-jp">50% / 50%</div></div>
</div>
<div class="result-actions">
<button id="restart-btn" class="btn-primary">다시 테스트하기</button>
<button id="share-btn" class="btn-secondary">결과 공유하기</button>
</div></div></div></div>
<script>
const questions=[
{id:1,text:'나는 혼자보다 여러 사람과 함께 있을 때 에너지를 얻는다.',dimension:'EI',direction:'E'},
{id:2,text:'나는 주말에 친구들을 만나서 시간을 보내는 것이 좋다.',dimension:'EI',direction:'E'},
{id:3,text:'나는 새로운 사람을 만나는 일이 즐겁다.',dimension:'EI',direction:'E'},
{id:4,text:'나는 깊은 대화보다 가벼운 잡담이 더 편하다.',dimension:'EI',direction:'E'},
{id:5,text:'혼자 있는 시간이 많아지면 금방 지루함을 느낀다.',dimension:'EI',direction:'E'},
{id:6,text:'나는 상상력보다는 현실적인 사실에 더 관심이 간다.',dimension:'SN',direction:'S'},
{id:7,text:'나는 세부적인 것에 주의를 기울이는 편이다.',dimension:'SN',direction:'S'},
{id:8,text:'나는 미래의 가능성보다 현재의 현실에 더 집중한다.',dimension:'SN',direction:'S'},
{id:9,text:'나는 상징이나 은유보다는 명확한 사실을 선호한다.',dimension:'SN',direction:'S'},
{id:10,text:'나는 오감을 통한 경험을 더 중요하게 생각한다.',dimension:'SN',direction:'S'},
{id:11,text:'나는 결정을 내릴 때 논리와 이성을 우선시한다.',dimension:'TF',direction:'T'},
{id:12,text:'나는 공정함보다는 조화와 관계를 중요시한다.',dimension:'TF',direction:'F'},
{id:13,text:'나는 다른 사람의 감정을 잘 고려하는 편이다.',dimension:'TF',direction:'F'},
{id:14,text:'나는 문제를 분석할 때 객관적인 사실을 중요시한다.',dimension:'TF',direction:'T'},
{id:15,text:'나는 논쟁에서 상대방의 감정을 상하게 하지 않으려고 노력한다.',dimension:'TF',direction:'F'},
{id:16,text:'나는 계획을 세우고 그대로 따르는 것을 좋아한다.',dimension:'JP',direction:'J'},
{id:17,text:'나는 즉흥적인 상황에 잘 적응하는 편이다.',dimension:'JP',direction:'P'},
{id:18,text:'나는 물건을 제자리에 정리정돈하는 것을 좋아한다.',dimension:'JP',direction:'J'},
{id:19,text:'나는 일정표에 따라 생활하는 것이 편하다.',dimension:'JP',direction:'J'},
{id:20,text:'나는 결정을 내릴 때 여러 선택지를 열어두고 싶어한다.',dimension:'JP',direction:'P'}
];
const typeInfo={ISTJ:{title:'신뢰할 수 있는 현실주의자',desc:'꼼꼼하고 책임감 강하며 전통을 중요하게 여깁니다.',emoji:'📋',color:'#4a90d9',aromaOil:'라벤더 + 시더우드. 클래식하고 안정적입니다. 시간이 지나도 변하지 않는 향입니다.',perfume:'Jo Malone — Lime Basil & Mandarin. 깔끔하고 클래식합니다. 오랫동안 사랑받는 이유가 있습니다.'},ISFJ:{title:'따뜻한 수호자',desc:'헌신적이고 배려 깊으며 조화를 중요시합니다.',emoji:'🛡️',color:'#50b8a0',aromaOil:'로만 캐모마일 + 바닐라. 달콤하고 포근합니다. 곁에 있으면 편안한 사람의 향기입니다.',perfume:'Jo Malone — Peony & Blush Suede. 부드러운 모란꽃과 스웨이드가 만나는 향입니다. 따뜻하고 우아합니다.'},INFJ:{title:'희귀한 옹호자',desc:'깊고 신비로우며 직관적입니다.',emoji:'🔮',color:'#9b59b6',aromaOil:'샌달우드 + 스모키 바닐라. 느리게 타오르는 깊은 향입니다. 조용하지만 존재감 있습니다.',perfume:'Diptyque — Tam Dao. 샌달우드 중심의 따뜻하고 깊은 향입니다. 처음엔 낯설지만 알면 알수록 좋아집니다.'},INTJ:{title:'전략가',desc:'독립적이고 분석적이며 목표 지향적입니다.',emoji:'🧠',color:'#2c3e50',aromaOil:'베르가못 + 버티버 + 시더. 화려하지 않지만 강인합니다. 가까이 다가섰을 때 비로소 압도됩니다.',perfume:'Le Labo — Santal 33. 샌달우드와 아이리스의 건조하고 중성적인 향입니다. 뉴욕의 지성적인 공간에서 자주 맡을 수 있는 향입니다.'},ISTP:{title:'만능 재주꾼',desc:'실용적이고 독립적이며 논리적입니다.',emoji:'🔧',color:'#e67e22',aromaOil:'유칼립투스 + 페퍼민트. 군더더기 없이 선명하고 맑습니다.',perfume:'Aesop — Hwyl. 침엽수와 스모키 우드의 조용하고 깊은 향입니다. 존재감을 드러내지 않지만 분명히 기억됩니다.'},ISFP:{title:'호기심 많은 예술가',desc:'감각적이고 유연하며 현재를 즐깁니다.',emoji:'🎨',color:'#e74c3c',aromaOil:'로즈 + 파출리. 플로럴하지만 달콤하지 않고 개성 있습니다.',perfume:'Diptyque — L\'Ombre dans l\'Eau. 장미 잎과 블랙커런트의 싱그럽고 독특한 향입니다. 예술적이고 자연스럽습니다.'},INFP:{title:'열정적인 중재자',desc:'시적이고 감수성 풍부하며 이상을 꿈꿉니다.',emoji:'🌸',color:'#c0392b',aromaOil:'라벤더 + 네롤리 + 로즈. 시를 쓰는 새벽 같은 향입니다. 감성적이고 로맨틱합니다.',perfume:'Frederic Malle — En Passant. 비 온 뒤 열린 창문으로 들어오는 라일락 향기입니다. 그리운 감정을 불러옵니다.'},INTP:{title:'논리적인 사색가',desc:'분석적이고 창의적이며 독창적입니다.',emoji:'💡',color:'#2980b9',aromaOil:'카다몸 + 그린티 + 샌달우드. 생각하게 만드는 향입니다. 처음엔 낯설지만 시간이 지날수록 깊어집니다.',perfume:'Escentric Molecules — Molecule 01. 이소 이 수퍼 단 하나의 성분으로 만든 향수입니다. 피부마다 다르게 발향됩니다. 분석하기 좋아하는 분들이 매혹되는 향입니다.'},ESTP:{title:'모험을 즐기는 사업가',desc:'대담하고 현실적이며 활동적입니다.',emoji:'🚀',color:'#f39c12',aromaOil:'블랙 페퍼 + 시트러스. 강렬하고 에너지 넘칩니다. 처음 만나는 순간 기억에 남습니다.',perfume:'Byredo — Gypsy Water. 베르가못과 솔잎, 샌달우드의 유랑하는 듯한 향입니다. 활동적이고 자유롭습니다.'},ESFP:{title:'자유로운 연예인',desc:'즉흥적이고 열정적이며 사교적입니다.',emoji:'🎉',color:'#e84393',aromaOil:'만다린 + 자스민 + 화이트 머스크. 밝고 달콤하며 사랑스럽습니다.',perfume:'Jo Malone — Wood Sage & Sea Salt. 바다 소금과 세이지의 청량하고 자유로운 향입니다. 어디서나 환영받는 향입니다.'},ENFP:{title:'재기발랄한 활동가',desc:'창의적이고 열정적이며 사람을 좋아합니다.',emoji:'🌈',color:'#fd79a8',aromaOil:'베르가못 + 그레이프프루트 + 자스민 + 바닐라. 에너지 넘치고 감성적입니다.',perfume:'Maison Margiela Replica — Flower Market. 봄 꽃시장의 싱그럽고 밝은 향입니다. 보는 사람을 웃게 만드는 향입니다.'},ENTP:{title:'논쟁을 즐기는 변론가',desc:'독창적이고 기발하며 도전을 즐깁니다.',emoji:'⚡',color:'#6c5ce7',aromaOil:'베르가못 + 라벤더 + 블랙페퍼 + 버티버. 처음엔 가볍다가 시간이 지날수록 복잡해집니다.',perfume:'Vilhelm Parfumerie — Basilico & Fellini. 바질과 레몬 버베나의 예상을 벗어나는 향입니다. 처음 맡는 사람이 반드시 묻게 되는 향입니다.'},ESTJ:{title:'엄격한 경영자',desc:'체계적이고 책임감 강하며 리더십이 있습니다.',emoji:'📊',color:'#00b894',aromaOil:'로즈마리 + 시더우드 + 앰버. 정돈되고 격식 있습니다.',perfume:'Hermès — Terre d\'Hermès. 흙과 나무, 자몽의 균형 잡힌 향입니다. 흐트러짐이 없고 신뢰감을 줍니다.'},ESFJ:{title:'사교적인 외교관',desc:'친절하고 배려 깊으며 조화를 중요시합니다.',emoji:'🤝',color:'#00cec9',aromaOil:'피오니 + 화이트 머스크. 밝고 따뜻하며 누구에게나 편안합니다.',perfume:'Chloé — Nomade Naturelle. 미모사와 샌달우드의 부드럽고 자연스러운 향입니다. 어디서나 잘 어울립니다.'},ENFJ:{title:'정의로운 사회운동가',desc:'카리스마 있고 공감 능력이 높으며 사람을 이끕니다.',emoji:'🌟',color:'#0984e3',aromaOil:'로즈 오토 + 프랑킨센스 + 샌달우드. 깊고 따뜻하며 신뢰감을 줍니다.',perfume:'Byredo — Bal d\'Afrique. 베르가못과 아프리카 마리골드, 머스크의 따뜻하고 포용력 있는 향입니다.'},ENTJ:{title:'대담한 통솔자',desc:'결단력 있고 자신감 넘치며 목표를 향해 달립니다.',emoji:'👑',color:'#d63031',aromaOil:'우드 앰버 + 블랙페퍼 + 로즈. 방에 들어서는 순간 존재감이 느껴집니다.',perfume:'Maison Francis Kurkdjian — Baccarat Rouge 540. 자스민과 사프란, 앰버그리스의 강렬하고 관능적인 향입니다. 기억에 남는 존재감을 원하는 분에게 맞습니다.'}};
let currentQuestion=0,scores={EI:0,SN:0,TF:0,JP:0};
const $=id=>document.getElementById(id);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function initQuiz(){currentQuestion=0,scores={EI:0,SN:0,TF:0,JP:0},shuffle(questions),showQuestion()}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')),$(id).classList.add('active')}
function showQuestion(){if(currentQuestion>=questions.length)return showResult();const q=questions[currentQuestion];$('question-number').textContent='Q'+(currentQuestion+1)+'.',$('question-text').textContent=q.text,$('progress-bar').style.width=((currentQuestion/questions.length)*100)+'%',$('progress-text').textContent=(currentQuestion+1)+' / '+questions.length,document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'))}
function selectOption(v){const q=questions[currentQuestion];document.querySelectorAll('.option-btn').forEach(b=>{b.classList.remove('selected'),parseInt(b.dataset.value)===v&&b.classList.add('selected')}),setTimeout(()=>{const s=parseInt(v);(q.direction==='E'||q.direction==='S'||q.direction==='T'||q.direction==='J')?scores[q.dimension]+=s:scores[q.dimension]-=s,currentQuestion++,showQuestion()},250)}
function calcType(){const ei=scores.EI>=0?'E':'I',sn=scores.SN>=0?'S':'N',tf=scores.TF>=0?'T':'F',jp=scores.JP>=0?'J':'P';return{type:ei+sn+tf+jp}}
function showResult(){const{type}=calcType(),info=typeInfo[type];showScreen('result-screen');const b=$('result-badge');b.textContent=type,b.style.background='linear-gradient(135deg,'+info.color+','+info.color+'88)',$('result-title').textContent=info.emoji+' '+info.title,$('result-subtitle').textContent=type+'형',$('result-description').textContent=info.desc,$('result-aroma').innerHTML='<strong>🌿 아로마오일 추천</strong><br><span style="color:#f0f0f5">'+info.aromaOil+'</span>',$('result-perfume').innerHTML='<strong>🧴 시중 향수 추천</strong><br><span style="color:#f0f0f5">'+info.perfume+'</span>';const tE=Math.max(Math.abs(scores.EI),1),tS=Math.max(Math.abs(scores.SN),1),tT=Math.max(Math.abs(scores.TF),1),tJ=Math.max(Math.abs(scores.JP),1),eP=scores.EI>=0?{l:Math.round(tE/(tE+1)*100),r:Math.round(1/(tE+1)*100)}:{l:Math.round(1/(tE+1)*100),r:Math.round(tE/(tE+1)*100)},sP=scores.SN>=0?{l:Math.round(tS/(tS+1)*100),r:Math.round(1/(tS+1)*100)}:{l:Math.round(1/(tS+1)*100),r:Math.round(tS/(tS+1)*100)},tP=scores.TF>=0?{l:Math.round(tT/(tT+1)*100),r:Math.round(1/(tT+1)*100)}:{l:Math.round(1/(tT+1)*100),r:Math.round(tT/(tT+1)*100)},jP=scores.JP>=0?{l:Math.round(tJ/(tJ+1)*100),r:Math.round(1/(tJ+1)*100)}:{l:Math.round(1/(tJ+1)*100),r:Math.round(tJ/(tJ+1)*100)};$('bar-e').style.width=eP.l+'%',$('percent-ei').textContent=eP.l+'% / '+eP.r+'%',$('bar-s').style.width=sP.l+'%',$('percent-sn').textContent=sP.l+'% / '+sP.r+'%',$('bar-t').style.width=tP.l+'%',$('percent-tf').textContent=tP.l+'% / '+tP.r+'%',$('bar-j').style.width=jP.l+'%',$('percent-jp').textContent=jP.l+'% / '+jP.r+'%'}
$('start-btn').addEventListener('click',()=>{showScreen('quiz-screen'),initQuiz()});
$('restart-btn').addEventListener('click',()=>{showScreen('home-screen')});
$('options').addEventListener('click',e=>{const b=e.target.closest('.option-btn');b&&selectOption(parseInt(b.dataset.value))});
$('share-btn').addEventListener('click',()=>{const{type}=calcType(),info=typeInfo[type],text='🧠 나의 MBTI 유형은 '+type+' ('+info.title+')입니다!\n\n'+info.desc+'\n🌿 추천 아로마오일: '+info.aromaOil+'\n🧴 추천 향수: '+info.perfume+'\n\n지금 나도 테스트해보세요!';navigator.share?navigator.share({title:'MBTI 향수 추천 테스트',text}):navigator.clipboard.writeText(text).then(()=>{$('share-btn').textContent='✅ 복사 완료!',setTimeout(()=>{$('share-btn').textContent='결과 공유하기'},2000)})});
</script>
</body>
</html>
