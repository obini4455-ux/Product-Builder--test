<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나는 강아지상? 고양이상? 동물상 테스트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
        }

        /* 홈 화면 */
        .emoji-big { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 24px; font-weight: 900; color: #333; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; line-height: 1.6; }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,107,107,0.4); }

        .btn-secondary {
            background: #f5f5f5;
            color: #555;
            border: none;
            border-radius: 50px;
            padding: 14px 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: background 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .btn-secondary:hover { background: #eee; }

        /* 업로드 화면 */
        .upload-area {
            border: 3px dashed #feca57;
            border-radius: 20px;
            padding: 40px 20px;
            margin: 24px 0;
            cursor: pointer;
            transition: background 0.2s;
            background: #fffef5;
        }
        .upload-area:hover { background: #fff9e0; }
        .upload-area p { color: #aaa; font-size: 14px; margin-top: 8px; }
        .upload-icon { font-size: 48px; }

        #file-input { display: none; }

        #preview-wrap { margin: 20px 0; display: none; }
        #preview-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #feca57;
            box-shadow: 0 8px 24px rgba(254,202,87,0.4);
        }

        /* 로딩 */
        .loading {
            display: none;
            margin: 20px 0;
        }
        .loading-dots { font-size: 32px; animation: bounce 1s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .loading p { color: #888; font-size: 14px; margin-top: 8px; }

        /* 결과 화면 */
        #result-screen { display: none; }

        .result-animal {
            font-size: 80px;
            margin: 10px 0;
            animation: pop 0.5s ease;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .result-badge {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 12px;
        }
        .dog-badge { background: #fff3e0; color: #f57c00; }
        .cat-badge { background: #f3e5f5; color: #7b1fa2; }

        .result-title { font-size: 26px; font-weight: 900; color: #333; margin-bottom: 8px; }
        .result-percent {
            font-size: 36px;
            font-weight: 900;
            margin: 12px 0;
        }
        .dog-percent { color: #f57c00; }
        .cat-percent { color: #7b1fa2; }

        .result-desc {
            background: #f9f9f9;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            font-size: 14px;
            color: #555;
            line-height: 1.8;
            text-align: left;
        }
        .result-desc strong { color: #333; font-size: 15px; }

        .bar-wrap { margin: 16px 0; }
        .bar-label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .bar-bg { background: #f0f0f0; border-radius: 50px; height: 14px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 50px; transition: width 1s ease; }
        .dog-bar { background: linear-gradient(90deg, #feca57, #f57c00); }
        .cat-bar { background: linear-gradient(90deg, #ce93d8, #7b1fa2); }

        .screen { }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="container">

    <!-- 홈 화면 -->
    <div id="home-screen">
        <div class="emoji-big">🐶🐱</div>
        <h1>나는 강아지상? 고양이상?</h1>
        <p class="subtitle">사진 한 장으로 알아보는<br>AI 동물상 테스트 🔍<br><br>얼굴 사진을 올려보세요!</p>
        <button class="btn-primary" onclick="showUpload()">테스트 시작하기</button>
    </div>

    <!-- 업로드 화면 -->
    <div id="upload-screen" class="hidden">
        <h1>📸 사진 올리기</h1>
        <p class="subtitle" style="margin-top:8px">얼굴이 잘 보이는 사진을 올려주세요</p>

        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <div class="upload-icon">🖼️</div>
            <p>클릭해서 사진 선택</p>
        </div>
        <input type="file" id="file-input" accept="image/*" onchange="loadImage(event)">

        <div id="preview-wrap">
            <img id="preview-img" src="" alt="미리보기">
        </div>

        <div class="loading" id="loading">
            <div class="loading-dots">🔍</div>
            <p>AI가 분석 중이에요...</p>
        </div>

        <button class="btn-primary" id="analyze-btn" onclick="analyze()" style="display:none">분석하기!</button>
        <button class="btn-secondary" onclick="showHome()">← 처음으로</button>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="hidden">
        <div class="result-animal" id="result-emoji"></div>
        <div class="result-badge" id="result-badge"></div>
        <div class="result-title" id="result-title"></div>
        <div class="result-percent" id="result-percent"></div>

        <div class="bar-wrap">
            <div class="bar-label">
                <span>🐶 강아지상</span>
                <span>🐱 고양이상</span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill dog-bar" id="dog-bar" style="width:50%"></div>
            </div>
        </div>

        <div class="result-desc" id="result-desc"></div>

        <button class="btn-primary" onclick="showUpload()">다시 테스트하기</button>
        <button class="btn-secondary" onclick="showHome()">처음으로</button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/aN2BwMiiZ/";
    let model = null;
    let loadedImage = null;

    const dogData = {
        emoji: "🐶",
        badge: "강아지상",
        badgeClass: "dog-badge",
        percentClass: "dog-percent",
        title: "당신은 강아지상이에요!",
        desc: `<strong>🐶 강아지상의 특징</strong><br><br>
따뜻하고 친근한 인상을 가지셨네요!<br><br>
• 주변 사람들에게 편안함을 주는 타입<br>
• 충성스럽고 신뢰감이 넘침<br>
• 표현이 풍부하고 애교가 많음<br>
• 사람들과 함께 있을 때 에너지가 넘침<br><br>
<strong>💕 잘 맞는 상대:</strong> 고양이상인 사람!`
    };

    const catData = {
        emoji: "🐱",
        badge: "고양이상",
        badgeClass: "cat-badge",
        percentClass: "cat-percent",
        title: "당신은 고양이상이에요!",
        desc: `<strong>🐱 고양이상의 특징</strong><br><br>
세련되고 신비로운 인상을 가지셨네요!<br><br>
• 독립적이고 자기만의 스타일이 있음<br>
• 차분하고 지적인 매력이 넘침<br>
• 좋아하는 사람에겐 한없이 다정함<br>
• 자유롭고 개성 있는 라이프스타일<br><br>
<strong>💕 잘 맞는 상대:</strong> 강아지상인 사람!`
    };

    async function loadModel() {
        if (!model) {
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
        }
    }

    function showHome() {
        document.getElementById('home-screen').classList.remove('hidden');
        document.getElementById('upload-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
    }

    function showUpload() {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('upload-screen').classList.remove('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('preview-wrap').style.display = 'none';
        document.getElementById('analyze-btn').style.display = 'none';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('file-input').value = '';
        loadedImage = null;
    }

    function loadImage(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('preview-img');
            img.src = e.target.result;
            img.onload = () => {
                loadedImage = img;
                document.getElementById('preview-wrap').style.display = 'block';
                document.getElementById('analyze-btn').style.display = 'block';
            };
        };
        reader.readAsDataURL(file);
    }

    async function analyze() {
        if (!loadedImage) return;

        document.getElementById('analyze-btn').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        try {
            await loadModel();
            const predictions = await model.predict(loadedImage);

            let dogScore = 0, catScore = 0;
            predictions.forEach(p => {
                const name = p.className.toLowerCase();
                if (name.includes('dog') || name.includes('강아지')) dogScore = p.probability;
                else if (name.includes('cat') || name.includes('고양이')) catScore = p.probability;
            });

            // 클래스명이 다를 경우 인덱스로 처리
            if (dogScore === 0 && catScore === 0 && predictions.length >= 2) {
                dogScore = predictions[0].probability;
                catScore = predictions[1].probability;
            }

            showResult(dogScore, catScore);
        } catch (e) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('analyze-btn').style.display = 'block';
            alert('분석 중 오류가 발생했어요. 다른 사진으로 시도해보세요!');
        }
    }

    function showResult(dogScore, catScore) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('upload-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        const isDog = dogScore >= catScore;
        const data = isDog ? dogData : catData;
        const mainPercent = Math.round((isDog ? dogScore : catScore) * 100);
        const dogPercent = Math.round(dogScore * 100);

        document.getElementById('result-emoji').textContent = data.emoji;
        document.getElementById('result-badge').textContent = data.badge;
        document.getElementById('result-badge').className = 'result-badge ' + data.badgeClass;
        document.getElementById('result-title').textContent = data.title;
        document.getElementById('result-percent').textContent = mainPercent + '%';
        document.getElementById('result-percent').className = 'result-percent ' + data.percentClass;
        document.getElementById('result-desc').innerHTML = data.desc;

        setTimeout(() => {
            document.getElementById('dog-bar').style.width = dogPercent + '%';
        }, 100);
    }
</script>
</body>
</html>
